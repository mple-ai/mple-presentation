services:
  postgres:
    image: postgres:15
    container_name: prisma-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # app:
  #   image: presentation:latest
  #   ports:
  #     - "3005:3005"
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mydb
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
