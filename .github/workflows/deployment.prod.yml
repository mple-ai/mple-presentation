name: PPT Generation PROD Deployment

on:
  workflow_dispatch:

jobs:
  gcp-prod-deployment:
    name: Build and push image, deploy
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: ${{ secrets.PROJECT_ID }}
      SERVICE_NAME: mple-ppt
      REGION: asia-south1
      ARTIFACT_REPO_NAME: ${{ secrets.ARTIFACT_REPO_NAME }}
      IMAGE_BASE: asia-south1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/${{ secrets.ARTIFACT_REPO_NAME }}/prod

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCR_DEVOPS_SERVICE_ACCOUNT_KEY }}"

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          install_components: beta

      - name: Update gcloud to latest
        run: gcloud components update -q

      - name: Configure Docker authentication
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev -q

      - name: Build Docker image
        run: |
          docker build \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL_PROD }}" \
            --build-arg NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
            --build-arg NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            --build-arg GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --build-arg GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --build-arg OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --build-arg TOGETHER_AI_API_KEY="${{ secrets.TOGETHER_AI_API_KEY }}" \
            --build-arg FAL_API_KEY="${{ secrets.FAL_API_KEY }}" \
            --build-arg UPLOADTHING_TOKEN="${{ secrets.UPLOADTHING_TOKEN }}" \
            --build-arg UNSPLASH_ACCESS_KEY="${{ secrets.UNSPLASH_ACCESS_KEY }}" \
            --build-arg TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
            --build-arg COGNITO_REGION="${{ secrets.COGNITO_REGION }}" \
            --build-arg COGNITO_USER_POOL_ID="${{ secrets.COGNITO_USER_POOL_ID_PROD }}" \
            --build-arg COGNITO_CLIENT_ID="${{ secrets.COGNITO_CLIENT_ID_PROD }}" \
            -t ${{ env.IMAGE_BASE }}:${{ github.sha }} \
            -t ${{ env.IMAGE_BASE }}:latest \
            .

      - name: Authenticate Docker with gcloud
        run: |
          gcloud auth print-access-token | docker login -u oauth2accesstoken \
            --password-stdin https://asia-south1-docker.pkg.dev

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_BASE }}:${{ github.sha }}
          docker push ${{ env.IMAGE_BASE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=${{ env.IMAGE_BASE }}:${{ github.sha }} \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --execution-environment=gen2

      - name: Verify deployment
        run: |
          STATUS=$(gcloud run services describe $SERVICE_NAME \
            --region=$REGION \
            --format='value(status.conditions[0].status)')
          echo "Deployment status: $STATUS"
          if [ "$STATUS" != "True" ]; then
            echo "Deployment failed or is not ready"
            exit 1
          fi
